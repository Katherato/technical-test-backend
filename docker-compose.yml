version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: backend_test_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: backend_test
    ports:
      - "3306:3306"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql

  customers-api:
    build: ./customers-api
    container_name: customers-api
    restart: always
    depends_on:
      - mysql
    ports:
      - "3001:3001"
    env_file:
      - ./customers-api/.env

  orders-api:
    build: ./orders-api
    container_name: orders-api
    restart: always
    depends_on:
      - mysql
      - customers-api
    ports:
      - "3002:3002"
    env_file:
      - ./orders-api/.env